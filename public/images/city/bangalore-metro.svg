<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0.94"/>
    </linearGradient>
    <radialGradient id="beam" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(560 120) rotate(90) scale(220 300)">
      <stop stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="train" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#efefff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg2)"/>
  <rect width="800" height="520" fill="url(#beam)"/>

  <g transform="translate(0,40)">
    <!-- track -->
    <rect x="0" y="390" width="800" height="20" fill="#0b0b16" opacity="0.12"/>
    <rect x="0" y="410" width="800" height="8" fill="#0b0b16" opacity="0.08"/>

    <!-- elevated pillar -->
    <rect x="372" y="260" width="56" height="160" rx="20" fill="#ffffff" opacity="0.32"/>

    <!-- rail deck -->
    <rect x="90" y="250" width="620" height="32" rx="16" fill="#ffffff" opacity="0.40"/>
    <rect x="120" y="258" width="560" height="16" rx="8" fill="#ffffff" opacity="0.28"/>

    <!-- train body -->
    <g>
      <rect x="190" y="160" width="420" height="120" rx="28" fill="url(#train)"/>
      <rect x="210" y="175" width="380" height="78" rx="22" fill="#6d28d9" opacity="0.18"/>
      <rect x="218" y="188" width="110" height="50" rx="16" fill="#0b0b16" opacity="0.20"/>
      <rect x="342" y="188" width="110" height="50" rx="16" fill="#0b0b16" opacity="0.20"/>
      <rect x="466" y="188" width="110" height="50" rx="16" fill="#0b0b16" opacity="0.20"/>

      <!-- front -->
      <rect x="560" y="175" width="38" height="78" rx="16" fill="#0b0b16" opacity="0.14"/>
      <circle cx="580" cy="235" r="6" fill="#ffffff" opacity="0.65"/>
      <circle cx="580" cy="215" r="6" fill="#ffffff" opacity="0.45"/>

      <!-- lights -->
      <circle cx="230" cy="246" r="5" fill="#ffffff" opacity="0.55"/>
      <circle cx="250" cy="246" r="5" fill="#ffffff" opacity="0.35"/>
    </g>

    <!-- sparkles -->
    <g opacity="0.45" fill="#ffffff">
      <path d="M120 190l6 10l10 6l-10 6l-6 10l-6-10l-10-6l10-6l6-10z" opacity="0.40"/>
      <path d="M690 140l8 14l14 8l-14 8l-8 14l-8-14l-14-8l14-8l8-14z"/>
    </g>
  </g>
</svg>

